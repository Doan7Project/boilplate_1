services:
  db:
    image: postgres:17-alpine3.20
    container_name: boilerplate_db
    environment:
      POSTGRES_USER: boilerplate_user
      POSTGRES_PASSWORD: Boiler@2025
      POSTGRES_DB: boilerplate_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerplate_user -d boilerplate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boilerplate_app
    ports:
      - '4001:4001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://boilerplate_user:Boiler@2025@db:5432/boilerplate_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
